name: Nightly agent
on:
  schedule:
    - cron: "0 7 * * MON"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Generate weekly brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/nightly_agent.py
      - name: Commit brief
        run: |
          git config user.name "boardroom-brief-agent[bot]"
          git config user.email "agent@boardroombrief"
          git add -A
          git diff --staged --quiet || git commit -m "chore(agent): weekly brief $(date -u +%Y-%m-%d)"
          git push